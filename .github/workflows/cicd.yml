name: CI/CD - Build Push Deploy

on:
  push:
    branches: ["main"]

env:
  TARGET_DIR: /home/${{ secrets.SSH_USER }}/nodejs_postgres_ruben

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # (optionnel mais utile) pour que Trivy voie bien les deps Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm ci

      # ✅ Trivy : scan DEPENDANCES seulement (libraries), fail sur CRITICAL
      - name: Trivy scan (Node deps only) - fail on CRITICAL
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: "fs"
          scan-ref: "."
          scanners: "vuln"
          vuln-type: "library"
          severity: "CRITICAL"
          exit-code: "1"

      # (optionnel) audit npm en plus
      - name: NPM Audit (fail on critical)
        run: npm audit --audit-level=critical

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy docker-compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "docker-compose.prod.yml,init-db.sql"
          target: "${{ env.TARGET_DIR }}"
          overwrite: true

      - name: Deploy on server (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            mkdir -p "${{ env.TARGET_DIR }}"
            cd "${{ env.TARGET_DIR }}"

            docker pull "${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.IMAGE_NAME }}:latest"
            docker compose -p "${{ secrets.IMAGE_NAME }}" -f docker-compose.prod.yml down
            docker compose -p "${{ secrets.IMAGE_NAME }}" -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f